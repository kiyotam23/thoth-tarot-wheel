<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0710;
  --gold: #c9a961;
  --gold-dim: #7a6438;
  --gold-bright: #e8cc8a;
  --purple: #6b3fa0;
  --purple-dim: #3d2460;
  --border: rgba(201,169,97,0.18);
  --fire: #e07858;
  --earth: #60c070;
  --air: #d4c040;
  --water: #6090e8;
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--gold);
  font-family: 'Inter', sans-serif;
  position: relative;
}
#root { height: 100vh; overflow: hidden; }
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}
.wheel-wrap {
  flex: 1;
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  overflow: hidden;
}
.wheel-svg {
  width: 100%;
  height: 100%;
  max-height: 100vh;
  display: block;
}
.panel {
  width: 290px;
  flex-shrink: 0;
  height: 100vh;
  overflow-y: auto;
  border-left: 1px solid var(--border);
  padding: 28px 22px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }
.panel-logo {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--gold-dim);
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.panel-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  opacity: 0.35;
  text-align: center;
}
.panel-empty-glyph {
  font-size: 48px;
  line-height: 1;
  opacity: 0.5;
}
.panel-empty-text {
  font-size: 11px;
  letter-spacing: 2px;
  font-family: 'Inter', sans-serif;
  color: var(--gold-dim);
  text-transform: uppercase;
}
.card-placeholder {
  width: 100%;
  aspect-ratio: 2/3;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(201,169,97,0.03);
  position: relative;
  overflow: hidden;
}
.card-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 8px,
    rgba(201,169,97,0.04) 8px,
    rgba(201,169,97,0.04) 9px
  );
}
.card-placeholder-glyph {
  font-size: 36px;
  opacity: 0.3;
  position: relative;
  font-family: 'Inter', sans-serif;
  font-variant-emoji: text;
}
.card-placeholder-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 2;
}
.zodiac-symbol {
  font-family: 'Inter', sans-serif;
  font-variant-emoji: text;
}
.card-placeholder-label {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--gold-dim);
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  position: relative;
}
.card-type-badge {
  display: inline-block;
  font-size: 8px;
  letter-spacing: 3px;
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  padding: 3px 8px;
  border: 1px solid currentColor;
  border-radius: 2px;
}
.card-number-name {
  border-bottom: 1px solid var(--border);
  padding-bottom: 14px;
}
.card-roman {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold-dim);
  font-family: 'Inter', sans-serif;
  margin-bottom: 4px;
}
.card-name {
  font-size: 26px;
  font-style: italic;
  font-weight: 400;
  line-height: 1.1;
  color: var(--gold-bright);
}
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.detail-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.detail-label {
  font-size: 10px;
  letter-spacing: 2px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  color: var(--gold-dim);
  text-transform: uppercase;
}
.detail-value {
  font-size: 16px;
  font-style: italic;
  font-weight: 500;
  color: var(--gold);
  line-height: 1.3;
}
.detail-value.mono {
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-size: 14px;
  font-weight: 500;
}
.divider {
  height: 1px;
  background: var(--border);
}
.hebrew-block {
  background: rgba(107,63,160,0.08);
  border: 1px solid rgba(107,63,160,0.2);
  border-radius: 3px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hebrew-glyph {
  font-size: 32px;
  text-align: center;
  color: var(--purple);
  filter: brightness(1.4);
  font-family: 'Inter', sans-serif;
  line-height: 1;
}
.hebrew-label {
  font-size: 12px;
  text-align: center;
  color: var(--gold-dim);
  font-style: italic;
}
.path-badge {
  font-size: 8px;
  letter-spacing: 2px;
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  color: var(--purple);
  filter: brightness(1.4);
  text-align: center;
}
.elem-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}
.mobile-sheet-handle-wrap,
.mobile-sheet-actions,
.mobile-backdrop,
.mobile-wheel-toggle {
  display: none;
}
@media (max-width: 820px) {
  html, body, #root { overflow: hidden; }
  .layout {
    position: relative;
    display: block;
    height: 100dvh;
    overflow: hidden;
  }
  .wheel-wrap {
    position: absolute;
    inset: 0;
    padding: 8px;
    z-index: 1;
  }
  .layout.mobile-wheel-hidden .wheel-wrap {
    transform: translateY(calc(-100% - 20px));
    opacity: 0.02;
    pointer-events: none;
  }
  .layout.mobile-sheet-open .zoom-controls {
    opacity: 0.45;
  }
  .wheel-wrap {
    transition: transform 220ms ease, opacity 220ms ease;
  }
  .mobile-wheel-toggle {
    display: inline-flex;
    position: absolute;
    top: calc(10px + env(safe-area-inset-top));
    right: 12px;
    z-index: 3;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(10,7,16,0.8);
    color: var(--gold);
    padding: 7px 10px;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
    backdrop-filter: blur(8px);
  }
  .layout.mobile-sheet-open .mobile-wheel-toggle {
    display: none !important;
    pointer-events: none;
  }
  .mobile-backdrop {
    display: block;
    position: absolute;
    inset: 0;
    z-index: 4;
    border: 0;
    background: linear-gradient(to top, rgba(10,7,16,0.42), rgba(10,7,16,0));
  }
  .panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    width: auto;
    border-left: none;
    border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    background: rgba(10,7,16,0.98);
    backdrop-filter: blur(12px);
    z-index: 5;
    max-height: calc(100dvh - 10px);
    transform: translateY(var(--sheet-offset, 0px));
    transition: transform 240ms ease;
    will-change: transform;
    display: flex;
    flex-direction: column;
    padding: 14px 18px calc(22px + env(safe-area-inset-bottom));
    overflow-y: auto;
    height: var(--sheet-height, 40dvh);
  }
  .panel.sheet-closed {
    --sheet-height: 40dvh;
    --sheet-offset: calc(100% + 22px);
    pointer-events: none;
  }
  .panel.sheet-peek {
    --sheet-height: 40dvh;
  }
  .panel.sheet-full {
    --sheet-height: calc(100dvh - 8px);
  }
  .mobile-sheet-handle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: -4px 0 10px;
    flex-shrink: 0;
    touch-action: none;
  }
  .mobile-sheet-handle {
    width: 42px;
    height: 4px;
    border-radius: 3px;
    background: rgba(201,169,97,0.55);
  }
  .mobile-sheet-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .mobile-sheet-btn {
    border: 1px solid var(--border);
    background: rgba(10,7,16,0.75);
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 8px;
    border-radius: 999px;
  }
  .panel-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 10px;
  }
  .card-name {
    font-size: 24px;
  }
  .detail-value {
    font-size: 15px;
  }
}

.tweak-btn {
  font-size: 9px;

.zoom-controls {
  position: absolute;
  bottom: 18px;
  right: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 10;

.zoom-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(10,7,16,0.85);
  color: var(--gold);
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 500;

.zoom-btn:hover {
  border-color: var(--gold);
  background: rgba(201,169,97,0.12);
  color: var(--gold-bright);

.zoom-btn-reset {
  font-size: 16px;
  margin-top: 4px;
  border-color: var(--gold-dim);

.rotate-group-label {
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold-dim);
  font-family: 'Inter', sans-serif;
  text-align: center;
  margin-top: 4px;

// ── HELPERS ────────────────────────────────────────────
function polar(r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return [CX + r * Math.cos(rad), CY + r * Math.sin(rad)];
}

function arc(ri, ro, a1, a2) {
  const [x1,y1] = polar(ro, a1), [x2,y2] = polar(ro, a2);
  const [x3,y3] = polar(ri, a2), [x4,y4] = polar(ri, a1);
  const lg = (a2-a1) > 180 ? 1 : 0;
  return `M${x1},${y1} A${ro},${ro},0,${lg},1,${x2},${y2} L${x3},${y3} A${ri},${ri},0,${lg},0,${x4},${y4} Z`;
}

function minorLikeTextRotation(angleDeg) {
  return angleDeg - 180;
}

// ── STARS ──────────────────────────────────────────────
const STARS = (() => {
  let s = 42;
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0xffffffff; };
  return Array.from({length:150}, () => ({ x: rnd()*860 - 430, y: rnd()*860 - 430, r: rnd()*1.1+0.2, o: rnd()*0.35+0.08 }));
})();

function Defs() {
  return (
    <defs>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow3" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="8" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>

// ── ZODIAC RING ────────────────────────────────────────
const RZO = 405, RZI = 348;

function ZodiacRing({ active, onHover, onClick }) {
  return (
    <g>
      {SIGNS.map((sg, i) => {
        const majorCard = MAJ_Z.find(c => c.sign === i);
        const a1 = i*30, a2 = a1+30, mid = a1+15;
        const ec = EC[sg.element];
        const isHov = active?.id === majorCard.id;
        const rot = minorLikeTextRotation(mid);
        const majorInlineLabel = `${majorCard.roman} - ${majorCard.short.toUpperCase()}`;
        // three concentric positions inside the zodiac cell
        const [symX, symY] = polar((RZO + RZI) / 2 + 10, mid); // symbol — upper area
        const [nameX, nameY] = polar((RZO + RZI) / 2 - 8, mid); // inline major label
        return (
          <g key={i} style={{cursor:'pointer'}}
            onMouseEnter={() => onHover({...majorCard, type:'major-zodiac', signInfo: sg})}
            onMouseLeave={() => onHover(null)}
            onClick={() => {
              const payload = {...majorCard, type:'major-zodiac', signInfo: sg};
              onClick(prev => prev?.id===majorCard.id ? null : payload);
            }}>
            <path d={arc(RZI, RZO, a1, a2)}
              fill={isHov ? ec.bg.replace('0.13','0.32') : ec.bg}
              stroke={ec.stroke} strokeWidth="0.8"
              style={{transition:'fill 0.2s'}}/>
            {/* sign symbol — large, flat */}
            <text
              x={symX} y={symY}
              textAnchor="middle" dominantBaseline="middle"
              fontSize="32" fill={isHov ? ec.text : ec.accent}
              fontFamily="'Inter', sans-serif"
              fontWeight="500"
              filter={isHov ? 'url(#glow2)' : undefined}
              transform={`rotate(${rot},${symX},${symY})`}
              style={{userSelect:'none', pointerEvents:'none', transition:'all 0.2s', fontVariantEmoji:'text'}}>
              {sg.symbol}
            </text>
            {/* inline major label: e.g. XI LUST */}
            <text
              x={nameX} y={nameY}
              textAnchor="middle" dominantBaseline="middle"
              fontSize="10.5" fill={isHov ? ec.text : ec.accent} opacity="1"
              fontFamily="'Inter', sans-serif"
              fontWeight="500"
              letterSpacing="0.6"
              transform={`rotate(${rot},${nameX},${nameY})`}
              style={{userSelect:'none', pointerEvents:'none', transition:'all 0.2s'}}>
              {majorInlineLabel}
            </text>
            {/* divider */}
            {(() => { const [dx1,dy1]=polar(RZI,a1),[dx2,dy2]=polar(RZO,a1);
              return <line x1={dx1} y1={dy1} x2={dx2} y2={dy2} stroke="rgba(201,169,97,0.25)" strokeWidth="0.5"/>; })()}
          </g>
        );

      <circle cx={CX} cy={CY} r={RZI} fill="none" stroke="rgba(201,169,97,0.2)" strokeWidth="0.5"/>
    </g>
  );
}

// ── MARKER ────────────────────────────────────────────
function Marker({ x, y, r, roman, label, color, active, onHover, onClick, id, glyph, textRotation = 0, inlineMajorLabel = false }) {
  const [hov, setHov] = useState(false);
  const on = hov || active;
  const hasLabel = Boolean(label);
  const hasGlyph = Boolean(glyph);
  const hasRoman = Boolean(roman);
  const labelSize = label && label.length > 12 ? 8 : (r >= 24 ? 9 : 8.5);
  const topY = y - (r * 0.58);
  const midY = y - (r * 0.04);
  const bottomY = y + (r * 0.52);
  const glyphY = hasLabel ? y - (r * 0.18) : y - (r * 0.03);
  const labelY = hasLabel ? y + (r * 0.38) : y + (r * 0.22);
  const isPlanetaryThreeLine = hasLabel && hasGlyph && hasRoman && !inlineMajorLabel;
  const inlineLabelText = hasRoman && hasLabel ? `${roman} - ${label.toUpperCase()}` : (label || '');
  return (
    <g style={{cursor:'pointer'}}
      onMouseEnter={() => { setHov(true); onHover(); }}
      onMouseLeave={() => { setHov(false); onHover(null); }}
      onClick={onClick}>
      <circle
        cx={x}
        cy={y}
        r={r + 6}
        fill="transparent"
        style={{pointerEvents:'all'}}
      />
      {on && <circle cx={x} cy={y} r={r+5} fill={color} opacity="0.15" filter="url(#glow3)"/>}
      {/* Planetary black marker circle removed */}
      <g transform={`rotate(${textRotation},${x},${y})`} style={{pointerEvents:'none'}}>
        {isPlanetaryThreeLine ? (
          <>
            <text x={x} y={topY} textAnchor="middle" dominantBaseline="middle"
              fontSize={labelSize} fontFamily="'Inter', sans-serif" fontStyle="italic"
              fontWeight="500"
              fill={on ? color : 'rgba(201,169,97,0.85)'}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {label}
            </text>
            <text x={x} y={midY} textAnchor="middle" dominantBaseline="middle"
              fontSize={r >= 24 ? 8.5 : 8} fontFamily="'Inter', sans-serif"
              fontWeight="500"
              fill={on ? color : 'rgba(201,169,97,0.86)'}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {roman}
            </text>
            <text x={x} y={bottomY} textAnchor="middle" dominantBaseline="middle"
              fontSize={r >= 24 ? 22 : 20} fontFamily="'Inter', sans-serif"
              fontWeight="600"
              fill={on ? color : 'rgba(201,169,97,0.95)'}
              filter={on ? 'url(#glow2)' : undefined}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {glyph}
            </text>
          </>
        ) : inlineMajorLabel ? (
          <>
            <text x={x} y={y - (r * 0.08)} textAnchor="middle" dominantBaseline="middle"
              fontSize={labelSize} fontFamily="'Inter', sans-serif" fontStyle="italic"
              fontWeight="500"
              fill={on ? color : 'rgba(201,169,97,0.88)'}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {inlineLabelText}
            </text>
            <text x={x} y={y + (r * 0.56)} textAnchor="middle" dominantBaseline="middle"
              fontSize={r >= 24 ? 20 : 18} fontFamily="'Inter', sans-serif"
              fontWeight="600"
              fill={on ? color : 'rgba(201,169,97,0.95)'}
              filter={on ? 'url(#glow2)' : undefined}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {glyph}
            </text>
          </>
        ) : (
          <>
            <text x={x} y={glyphY} textAnchor="middle" dominantBaseline="middle"
              fontSize={r >= 24 ? 14 : r >= 20 ? 12 : 11} fontFamily="'Inter', sans-serif"
              fontWeight="600"
              fill={on ? color : 'rgba(201,169,97,0.95)'}
              filter={on ? 'url(#glow2)' : undefined}
              style={{userSelect:'none', transition:'all 0.25s'}}>
              {glyph || roman}
            </text>
            {hasLabel && (
              <text x={x} y={labelY} textAnchor="middle" dominantBaseline="middle"
                fontSize={labelSize} fontFamily="'Inter', sans-serif" fontStyle="italic"
                fontWeight="500"
                fill={on ? color : 'rgba(201,169,97,0.85)'}
                style={{userSelect:'none', transition:'all 0.25s'}}>
                {label}
              </text>
            )}
          </>
        )}
      </g>
    </g>
  );
}

// ── HEPTAGRAM ──────────────────────────────────────────
const RHP = 152;

function Heptagram({ active, onHover, onClick }) {
  const pts = MAJ_P.map((_, i) => polar(RHP, i * (360/7)));

  // Draw heptagram lines
  const lines = [];
  for (let i = 0; i < 7; i++) {
    const j = (i + 3) % 7; // {7/3} star
    lines.push(<line key={i} x1={pts[i][0]} y1={pts[i][1]} x2={pts[j][0]} y2={pts[j][1]}
      stroke="rgba(107,63,160,0.25)" strokeWidth="0.6"/>);
  }

  return (
    <g>
      {lines}
      {MAJ_P.map((card, i) => {
        const [x, y] = pts[i];
        const angle = i * (360/7);
        return (
          <Marker key={card.id} x={x} y={y} r={27}
            roman={card.roman} glyph={card.planet} label={card.short}
            color="#c9a961"
            active={active?.id === card.id}
            onHover={(v) => onHover(v === null ? null : {...card, type:'major-planet'})}
            onClick={() => onClick(prev => prev?.id===card.id ? null : {...card, type:'major-planet'})}
            textRotation={minorLikeTextRotation(angle)}
            inlineMajorLabel
            id={card.id}/>
        );
      })}
    </g>
  );
}

const RET = 62;

function ElementalTriangle({ active, onHover, onClick }) {
  const angles = [270, 30, 150]; // Fool top, Aeon BR, HM BL — wait spec says Fool Air, HM Water, Aeon Fire
  const triAngles = [270, 30, 150]; // top, bottom-right, bottom-left
  const elemOrder = [MAJ_E[0], MAJ_E[2], MAJ_E[1]]; // Fool, Aeon, Hanged Man
  const elemColors = ['#d4c040', '#e07858', '#6090e8']; // Air, Fire, Water

  const pts = triAngles.map(a => polar(RET, a));

  return (
    <g>
      {/* Triangle outline */}
      <polygon
        points={pts.map(p=>p.join(',')).join(' ')}
        fill="none"
        stroke="rgba(107,63,160,0.3)"
        strokeWidth="0.7"/>
      {elemOrder.map((card, i) => {
        const [x, y] = pts[i];
        const angle = triAngles[i];
        return (
          <Marker key={card.id} x={x} y={y} r={25}
            roman={card.roman} glyph={card.planet} label={card.short}
            color={elemColors[i]}
            active={active?.id === card.id}
            onHover={(v) => onHover(v === null ? null : {...card, type:'major-elemental', elemColor: elemColors[i]})}
            onClick={() => onClick(prev => prev?.id===card.id ? null : {...card, type:'major-elemental', elemColor: elemColors[i]})}
            textRotation={minorLikeTextRotation(angle)}
            inlineMajorLabel
            id={card.id}/>
        );
      })}
    </g>
  );
}

// ── COURT CARD RING ────────────────────────────────────
const RKQP_O = 434, RKQP_I = 411; // Knights / Queens / Princes sub-ring
const RPS_O  = 454, RPS_I  = 436; // Princesses sub-ring

function CourtRing({ active, onHover, onClick }) {
  return (
    <g>
      {/* Knights, Queens, Princes — continuous 30° wedges */}
      {COURT_KQP.map(card => {
        const a2 = card.a2 <= card.a1 ? card.a2 + 360 : card.a2;
        const sc = SC[card.suit];
        const isHov = active?.id === card.id;
        const rot = minorLikeTextRotation(card.mid);
        const [tx, ty] = polar(RKQP_I + 11, card.mid);
        return (
          <g key={card.id} style={{cursor:'pointer'}}
            onMouseEnter={() => onHover({...card, type:'court'})}
            onMouseLeave={() => onHover(null)}
            onClick={() => onClick(prev => prev?.id===card.id ? null : {...card, type:'court'})}>
            <path d={arc(RKQP_I, RKQP_O, card.a1, a2)}
              fill={isHov ? `${sc}22` : `${sc}09`}
              stroke={isHov ? sc : `${sc}50`}
              strokeWidth={isHov ? '0.9' : '0.4'}
              filter={isHov ? 'url(#glow2)' : undefined}
              style={{transition:'all 0.2s'}}/>
            <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
              fontSize="9" fill={isHov ? sc : sc}
              fontFamily="'Inter', sans-serif" fontStyle="italic"
              fontWeight="500"
              transform={`rotate(${rot},${tx},${ty})`}
              style={{userSelect:'none',pointerEvents:'none',transition:'fill 0.2s'}}>
              {`${card.rank} of ${card.suit}`}
            </text>
          </g>
        );
      })}

      {/* Princesses — outer sub-ring, dashed arcs at cardinal cusps */}
      {COURT_PS.map(card => {
        const a2 = card.a2 <= card.a1 ? card.a2 + 360 : card.a2;
        const sc = SC[card.suit];
        const isHov = active?.id === card.id;
        const rot = minorLikeTextRotation(card.mid);
        const [tx, ty] = polar((RPS_O + RPS_I) / 2, card.mid);
        return (
          <g key={card.id} style={{cursor:'pointer'}}
            onMouseEnter={() => onHover({...card, type:'court'})}
            onMouseLeave={() => onHover(null)}
            onClick={() => onClick(prev => prev?.id===card.id ? null : {...card, type:'court'})}>
            <path d={arc(RPS_I, RPS_O, card.a1, a2)}
              fill={isHov ? `${sc}28` : `${sc}0d`}
              stroke={isHov ? sc : `${sc}60`}
              strokeWidth={isHov ? '0.9' : '0.5'}
              strokeDasharray={isHov ? undefined : '2.5 2'}
              filter={isHov ? 'url(#glow2)' : undefined}
              style={{transition:'all 0.2s'}}/>
            <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
              fontSize="9" fill={isHov ? sc : sc}
              fontFamily="'Inter', sans-serif" fontStyle="italic"
              fontWeight="500"
              transform={`rotate(${rot},${tx},${ty})`}
              style={{userSelect:'none',pointerEvents:'none',transition:'fill 0.2s'}}>
              {`Princess of ${card.suit}`}
            </text>
          </g>
        );
      })}

      <circle cx={CX} cy={CY} r={RPS_O}  fill="none" stroke="rgba(201,169,97,0.18)" strokeWidth="0.6"/>
      <circle cx={CX} cy={CY} r={RPS_I}  fill="none" stroke="rgba(201,169,97,0.12)" strokeWidth="0.4" strokeDasharray="2 3"/>
      <circle cx={CX} cy={CY} r={RKQP_I} fill="none" stroke="rgba(201,169,97,0.18)" strokeWidth="0.6"/>
    </g>
  );
}

// ── ACE RING (90° QUADRANTS) ───────────────────────────
const RA_O = 502, RA_I = 470;

function AceMarkers({ active, onHover, onClick }) {
  return (
    <g>
      {ACES.map(card => {
        const quad = COURT_PS.find(ps => ps.suit === card.suit);
        if (!quad) return null;
        const a2 = quad.a2 <= quad.a1 ? quad.a2 + 360 : quad.a2;
        const mid = quad.mid;
        const [x, y] = polar((RA_O + RA_I) / 2, mid);
        const sc = SC[card.suit];
        const isHov = active?.id === card.id;
        const rot = minorLikeTextRotation(mid);
        const elementSymbol = ELEMENT_SYMBOL[card.element] || '✦';
        return (
          <g key={card.id} style={{cursor:'pointer'}}
            onMouseEnter={() => onHover({...card, type:'ace'})}
            onMouseLeave={() => onHover(null)}
            onClick={() => onClick(prev => prev?.id===card.id ? null : {...card, type:'ace'})}>
            <path
              d={arc(RA_I, RA_O, quad.a1, a2)}
              fill={isHov ? `${sc}24` : `${sc}10`}
              stroke={isHov ? sc : `${sc}70`}
              strokeWidth={isHov ? '0.9' : '0.5'}
              strokeDasharray={isHov ? undefined : '2.5 2'}
              filter={isHov ? 'url(#glow2)' : undefined}
              style={{transition:'all 0.2s'}}
            />
            <g transform={`rotate(${rot},${x},${y})`} style={{pointerEvents:'none'}}>
              <text x={x} y={y-2} textAnchor="middle" dominantBaseline="middle"
                fontSize="16" fontFamily="'Inter', sans-serif"
                fontWeight="500"
                fill={isHov ? sc : `${sc}e0`}
                filter={isHov ? 'url(#glow2)' : undefined}
                style={{userSelect:'none', transition:'all 0.25s'}}>
                {elementSymbol}
              </text>
              <text x={x} y={y+11} textAnchor="middle" dominantBaseline="middle"
                fontSize="7.2" fontFamily="'Inter', sans-serif" fontStyle="italic"
                fontWeight="500"
                fill={isHov ? sc : `${sc}cc`}
                style={{userSelect:'none', transition:'all 0.25s'}}>
                {card.name}
              </text>
            </g>
          </g>
        );
      })}
      <circle cx={CX} cy={CY} r={RA_O} fill="none" stroke="rgba(201,169,97,0.16)" strokeWidth="0.55"/>
      <circle cx={CX} cy={CY} r={RA_I} fill="none" stroke="rgba(201,169,97,0.10)" strokeWidth="0.4" strokeDasharray="2 3"/>
    </g>
  );
}

// ── CARD IMAGE RESOLUTION ──────────────────────────────
// Converts a card name into a filename, e.g.:
//   "The Fool"       → "the-fool"
//   "The Hanged Man" → "the-hanged-man"
//   "Lust"           → "lust"
//   "Dominion"       → "dominion"
//   "Ace of Wands"   → "ace-of-wands"
//   "Knight of Cups" → "knight-of-cups"
function cardFilename(name) {
  if (!name) return null;
  return name
    .toLowerCase()
    .replace(/[''']/g, '')
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-');
}

function getCardImageSrc(card) {
  if (!card) return null;
  // Court cards: "knight-of-wands.png"
  if (card.type === 'court') {
    const rank = card.rank?.toLowerCase();
    const suit = card.suit?.toLowerCase();
    if (rank && suit) return `images/${rank}-of-${suit}.png`;
  }
  // Aces: "ace-of-wands.png"
  if (card.type === 'ace') {
    const suit = card.suit?.toLowerCase();
    if (suit) return `images/ace-of-${suit}.png`;
  }
  // Pip minor arcana (2–10): "2-of-wands.png"
  if (card.type === 'minor' && card.num && card.suit) {
    return `images/${card.num}-of-${card.suit.toLowerCase()}.png`;
  }
  // Majors: use card name, e.g. "the-fool.png", "lust.png"
  const fn = cardFilename(card.name);
  return fn ? `images/${fn}.png` : null;
}

function CardImage({ card, fallbackGlyph, fallbackColor }) {
  const [errored, setErrored] = useState(false);
  const src = getCardImageSrc(card);
  // Reset error state when card changes
  useEffect(() => { setErrored(false); }, [src]);

  return (
    <div className="card-placeholder">
      {src && !errored && (
        <img
          className="card-placeholder-img"
          src={src}
          alt={card?.name || 'card'}
          onError={() => setErrored(true)}
        />
      )}
      {(!src || errored) && (
        <>
          <div className="card-placeholder-glyph" style={{color: fallbackColor}}>{fallbackGlyph}</div>
          <div className="card-placeholder-label">card image</div>
        </>
      )}
    </div>
  );
}

function InfoPanel({ card, className = '', style, headerSlot = null }) {
  if (!card) return (
    <div className={`panel ${className}`.trim()} style={style}>
      {headerSlot}
      <div className="panel-empty">
        <div className="panel-empty-glyph">✦</div>
        <div className="panel-empty-text">Hover or click<br/>any card to explore</div>
      </div>
      <LegendBlock/>
    </div>
  );

  const typeLabel = card.type === 'minor' ? 'Minor Arcana' :
    card.type === 'major-zodiac' ? 'Major Arcana · Zodiac' :
    card.type === 'major-planet' ? 'Major Arcana · Planet' :
    card.type === 'major-elemental' ? 'Major Arcana · Element' :
    card.type === 'court' ? `Court Card · ${card.rank}` :
    card.type === 'ace' ? 'Minor Arcana · Ace' :
    'Card';

  const typeColor = card.type === 'minor' ? (SC[card.suit] || '#c9a961')
    : card.type === 'major-zodiac' ? (EC[SIGNS[card.sign]?.element]?.accent || '#c9a961')
    : card.type === 'major-planet' ? '#c9a961'
    : card.type === 'major-elemental' ? (card.elemColor || '#c9a961')
    : (card.suit ? SC[card.suit] : '#c9a961');

  // Card placeholder glyph
  const glyph = card.type === 'minor' ? card.planet
    : card.type === 'major-zodiac' ? SIGNS[card.sign].symbol
    : card.type === 'major-planet' ? card.planet
    : card.type === 'major-elemental' ? card.planet
    : card.type === 'court' ? (card.rank === 'Knight' ? '♞' : card.rank === 'Queen' ? '♛' : card.rank === 'Prince' ? '♜' : '◈')
    : card.type === 'ace' ? '✦' : '✦';

  const displayCardName =
    (card.type === 'major-zodiac' || card.type === 'major-planet' || card.type === 'major-elemental')
      ? `${card.roman || card.num} - ${card.name.toUpperCase()}`
    :
    card.type === 'court' ? `${card.rank} of ${card.suit}` :
    card.type === 'minor' ? `${card.num} of ${card.suit}` :
    card.name;

  const displayCardIndex =
    (card.type === 'major-zodiac' || card.type === 'major-planet' || card.type === 'major-elemental')
      ? null
    :
    card.type === 'court' ? card.rank :
    (card.roman || card.num);

  return (
    <div className={`panel ${className}`.trim()} style={style}>
      {headerSlot}

      {/* Type badge */}
      <div><span className="card-type-badge" style={{color: typeColor, borderColor: `${typeColor}60`}}>{typeLabel}</span></div>

      {/* Card image (actual file if available, fallback to glyph) */}
      <CardImage card={card} fallbackGlyph={glyph} fallbackColor={typeColor}/>

      {/* Number and name */}
      <div className="card-number-name">
        {displayCardIndex ? <div className="card-roman">{displayCardIndex}</div> : null}
        <div className="card-name" style={{color: typeColor}}>{displayCardName}</div>
      </div>

      {/* Details grid */}
      {card.type === 'minor' && (
        <div className="detail-grid">
          <DetailRow label="Thoth Title" value={card.name} wide/>
          <DetailRow label="Suit" value={card.suit}/>
          <DetailRow label="Number" value={card.num} mono/>
          <DetailRow label="Sign" value={SIGNS[card.sign].name}/>
          <DetailRow label="Element" value={SIGNS[card.sign].element}/>
          <DetailRow label="Decan" value={`${card.sign*30+card.decan*10}°–${card.sign*30+card.decan*10+10}°`} mono/>
          <DetailRow label="Planet" value={`${card.planet} ${card.planetName}`}/>
          <DetailRow label="Modality" value={SIGNS[card.sign].modality}/>
          <DetailRow label="Sign Ruler" value={SIGNS[card.sign].ruler}/>
        </div>
      )}

      {card.type === 'major-zodiac' && (
        <>
          <div className="detail-grid">
            <DetailRow label="Sign" value={<><span className="zodiac-symbol">{SIGNS[card.sign].symbol}</span> {SIGNS[card.sign].name}</>}/>
            <DetailRow label="Element" value={SIGNS[card.sign].element}/>
            <DetailRow label="Modality" value={SIGNS[card.sign].modality}/>
            <DetailRow label="Ruler" value={SIGNS[card.sign].ruler}/>
            <DetailRow label="Path Type" value={card.path} wide/>
          </div>
          <div className="divider"/>
          <HebrewBlock card={card}/>
        </>
      )}

      {card.type === 'major-planet' && (
        <>
          <div className="detail-grid">
            <DetailRow label="Planet" value={`${card.planet} ${card.planetName}`}/>
            <DetailRow label="Path Type" value={card.path}/>
          </div>
          <div className="divider"/>
          <HebrewBlock card={card}/>
        </>
      )}

      {card.type === 'major-elemental' && (
        <>
          <div className="detail-grid">
            <DetailRow label="Element" value={card.element}/>
            <DetailRow label="Planet" value={`${card.planet} ${card.planetName}`}/>
            <DetailRow label="Path Type" value={card.path} wide/>
          </div>
          <div className="divider"/>
          <HebrewBlock card={card}/>
        </>
      )}

      {card.type === 'court' && (
        <div className="detail-grid">
          <DetailRow label="Rank" value={card.rank}/>
          <DetailRow label="Suit" value={card.suit}/>
          <DetailRow label="Degrees" value={card.rank === 'Princess' ? `${card.a1}°–${card.a2}° (90°)` : `${card.a1}°–${card.a2 < card.a1 ? card.a2 + 360 : card.a2}°`} mono/>
          <DetailRow label="Element" value={card.element}/>
          {card.desc && <DetailRow label={card.rank === 'Princess' ? 'Quadrant (3 Signs)' : 'Element Type'} value={card.desc} wide/>}
          {card.rank === 'Princess' && <DetailRow label="Attribution" value="Spatial (not zodiacal)" wide/>}
        </div>
      )}

      {card.type === 'ace' && (
        <div className="detail-grid">
          <DetailRow label="Suit" value={card.suit}/>
          <DetailRow label="Number" value="I" mono/>
          <DetailRow label="Element" value={card.element}/>
          <DetailRow label="Placement" value="Cardinal Axis"/>
          <DetailRow label="Meaning" value={card.desc} wide/>
        </div>
      )}
    </div>
  );
}

// ── APP ────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(null);
  const [hovered, setHovered] = useState(null);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.matchMedia('(max-width: 820px)').matches);
  const [isWheelHiddenMobile, setIsWheelHiddenMobile] = useState(false);
  const [sheetState, setSheetState] = useState('closed'); // closed | peek | full
  const [zodiacRotation, setZodiacRotation] = useState(0);
  const [planetaryRotation, setPlanetaryRotation] = useState(0);
  const [sheetDragOffset, setSheetDragOffset] = useState(0);
  const sheetDragRef = useRef({ active: false, startY: 0, stateAtStart: 'closed' });
  const active = selected || hovered;

  // ── Fixed View (no user zoom/pan) ─────────────────────
  const BASE_VB = { x: 0, y: 0, w: 485, h: 485 };
  const vb = BASE_VB;
  const closeSheet = () => {
    setSheetState('closed');
    setSheetDragOffset(0);
  };
  const expandSheet = () => {
    if (!selected) return;
    setSheetState('full');
    setSheetDragOffset(0);
  };


  // Register tweaks with host
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  }, []);

  useEffect(() => {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
  }, [tweaks]);

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 820px)');
    const onChange = (e) => setIsMobile(e.matches);
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', onChange);
      else mq.removeListener(onChange);
    };
  }, []);

  useEffect(() => {
    if (!isMobile) setIsWheelHiddenMobile(false);
  }, [isMobile]);

  useEffect(() => {
    if (!isMobile) {
      setSheetState('closed');
      setSheetDragOffset(0);
      return;
    }
    if (!selected) {
      setSheetState('closed');
      setSheetDragOffset(0);
      return;
    }
    if (sheetState === 'closed') {
      setSheetState('peek');
      setSheetDragOffset(0);
    }
  }, [isMobile, selected, sheetState]);

  useEffect(() => {
    if (!isMobile) return;
    const onEsc = (e) => {
      if (e.key !== 'Escape') return;
      if (sheetState === 'full') setSheetState('peek');
      else if (sheetState === 'peek') closeSheet();
    };
    window.addEventListener('keydown', onEsc);
    return () => window.removeEventListener('keydown', onEsc);
  }, [isMobile, sheetState]);

  const handleHover = (card) => {
    if (isMobile) return;
    if (!selected) setHovered(card); else setHovered(null);
  };
  const handleClick = (updater) => {
    const nextSelected = typeof updater === 'function' ? updater(selected) : updater;
    setSelected(nextSelected);
    setHovered(null);
    if (isMobile) {
      if (nextSelected) setSheetState('peek');
      else closeSheet();
    }
  };

  const handleSheetTouchStart = (e) => {
    if (!isMobile || !selected) return;
    if (e.touches.length !== 1) return;
    sheetDragRef.current = {
      active: true,
      startY: e.touches[0].clientY,
      stateAtStart: sheetState,
    };
    setSheetDragOffset(0);
  };

  const handleSheetTouchMove = (e) => {
    if (!sheetDragRef.current.active) return;
    const deltaY = e.touches[0].clientY - sheetDragRef.current.startY;
    const isDraggingDown = deltaY > 0;
    const isDraggingUp = deltaY < 0;
    const canDrag =
      (sheetDragRef.current.stateAtStart === 'full' && isDraggingDown) ||
      (sheetDragRef.current.stateAtStart === 'peek' && (isDraggingDown || isDraggingUp));
    if (!canDrag) return;
    e.preventDefault();
    const limited = Math.max(-180, Math.min(260, deltaY));
    setSheetDragOffset(limited);
  };

  const handleSheetTouchEnd = () => {
    if (!sheetDragRef.current.active) return;
    const { stateAtStart } = sheetDragRef.current;
    const deltaY = sheetDragOffset;
    sheetDragRef.current.active = false;
    setSheetDragOffset(0);
    if (stateAtStart === 'full') {
      if (deltaY > 120) setSheetState('peek');
      return;
    }
    if (stateAtStart === 'peek') {
      if (deltaY > 140) closeSheet();
      else if (deltaY < -90) setSheetState('full');
    }
  };

  const mobileSheetClass = isMobile
    ? (sheetState === 'full' ? 'sheet-full' : sheetState === 'peek' ? 'sheet-peek' : 'sheet-closed')
    : '';
  const panelStyle = isMobile && sheetState !== 'closed'
    ? { transform: `translateY(${Math.max(0, sheetDragOffset)}px)` }
    : undefined;

  return (
    <div className={`layout ${isMobile && sheetState !== 'closed' ? 'mobile-sheet-open' : ''} ${isMobile && isWheelHiddenMobile ? 'mobile-wheel-hidden' : ''}`}>
      {isMobile && sheetState === 'closed' && (
        <button
          className="mobile-wheel-toggle"
          onClick={() => setIsWheelHiddenMobile(v => !v)}
          aria-pressed={isWheelHiddenMobile}
        >
          {isWheelHiddenMobile ? 'Show Wheel' : 'Hide Wheel'}
        </button>
      )}
      <div className="wheel-wrap" style={{position:'relative'}}>
        <svg
          viewBox={`${vb.x} ${vb.y} ${vb.w} ${vb.h}`}
          className="wheel-svg"
          style={{overflow:'visible', cursor: 'default'}}>
          <Defs/>
          {/* Invisible pan-catcher background (huge rect) */}
          <rect className="pan-bg" x="-2000" y="-2000" width="4860" height="4860" fill="transparent"/>
          <g opacity="0.7">
            {STARS.map((s,i) => <circle key={i} cx={s.x} cy={s.y} r={s.r} fill="white" opacity={s.o}/>)}
          </g>
          <circle cx={CX} cy={CY} r={240} fill="url(#cg)"/>
          <circle cx={CX} cy={CY} r={420} fill="url(#hg)"/>
          <g transform={`rotate(${zodiacRotation}, ${CX}, ${CY})`}>
            {tweaks.showAces && <AceMarkers active={active} onHover={handleHover} onClick={handleClick}/>}
            {tweaks.showCourt && <CourtRing active={active} onHover={handleHover} onClick={handleClick}/>}
            <ZodiacRing active={active} onHover={handleHover} onClick={handleClick}/>
            {tweaks.showDecans && <DecanRing active={active} onHover={handleHover} onClick={handleClick}/>}
            {tweaks.showZodiacMajor && <MajorZodiacRing active={active} onHover={handleHover} onClick={handleClick}/>}
          </g>
          <g transform={`rotate(${planetaryRotation}, ${CX}, ${CY})`}>
            {tweaks.showPlanetary && <Heptagram active={active} onHover={handleHover} onClick={handleClick}/>}
            {tweaks.showElemental && <ElementalTriangle active={active} onHover={handleHover} onClick={handleClick}/>}
          </g>
          <circle cx={CX} cy={CY} r={16} fill="none" stroke="rgba(201,169,97,0.2)" strokeWidth="0.7"/>
          <circle cx={CX} cy={CY} r={6} fill="rgba(201,169,97,0.12)" stroke="rgba(201,169,97,0.45)" strokeWidth="0.7"/>
        </svg>
        <div className="zoom-controls">
          <div className="rotate-group-label">Zodiac</div>
          <button
            className="zoom-btn"
            onClick={() => setZodiacRotation(r => r - 10)}
            title="Rotate zodiac -10°"
          >Z↺</button>
          <button
            className="zoom-btn"
            onClick={() => setZodiacRotation(r => r + 10)}
            title="Rotate zodiac +10°"
          >Z↻</button>
          <button className="zoom-btn zoom-btn-reset" onClick={() => setZodiacRotation(0)} title="Reset zodiac rotation">Z⟲</button>
          <div className="rotate-group-label">Planet</div>
          <button
            className="zoom-btn"
            onClick={() => setPlanetaryRotation(r => r - 10)}
            title="Rotate planetary -10°"
          >P↺</button>
          <button
            className="zoom-btn"
            onClick={() => setPlanetaryRotation(r => r + 10)}
            title="Rotate planetary +10°"
          >P↻</button>
          <button className="zoom-btn zoom-btn-reset" onClick={() => setPlanetaryRotation(0)} title="Reset planetary rotation">P⟲</button>
        </div>
      </div>
      {isMobile && sheetState === 'full' && (
        <button
          className="mobile-backdrop"
          aria-label="Close card details"
          onClick={closeSheet}
        />
      )}
      {isMobile && (
        <InfoPanel
          card={active}
          className={mobileSheetClass}
          style={panelStyle}
          headerSlot={(
            <div
              className="mobile-sheet-handle-wrap"
              onTouchStart={handleSheetTouchStart}
              onTouchMove={handleSheetTouchMove}
              onTouchEnd={handleSheetTouchEnd}
            >
              <div className="mobile-sheet-handle" />
              <div className="mobile-sheet-actions">
                {sheetState === 'peek' && selected && (
                  <button className="mobile-sheet-btn" onClick={expandSheet}>Full</button>
                )}
                {sheetState === 'full' && selected && (
                  <button className="mobile-sheet-btn" onClick={closeSheet}>Close</button>
                )}
              </div>
            </div>
          )}
        />
      )}
      {!isMobile && <InfoPanel card={active} />}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
